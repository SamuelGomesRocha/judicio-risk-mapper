version: '3.8'

# Configuração para desenvolvimento local
# Use este arquivo se precisar de hot-reload ou debug
# docker-compose -f docker-compose.dev.yml up

services:
  frontend-dev:
    build:
      context: .
      dockerfile: Dockerfile.dev
    container_name: risk-mapper-dev
    restart: unless-stopped
    ports:
      - "8080:8080"
      - "5173:5173"
    environment:
      - NODE_ENV=development
    volumes:
      - .:/app
      - /app/node_modules
      - /app/dist
    networks:
      - risk-mapper-network
    command: bun run dev

networks:
  risk-mapper-network:
    driver: bridge
