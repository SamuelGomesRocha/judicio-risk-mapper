version: '3.8'

services:
  frontend:
    image: ghcr.io/samuelgomesrocha/sar_front_end:latest
    container_name: sar-risk-mapper-frontend
    restart: unless-stopped
    ports:
      - "5731:80"
    environment:
      - NODE_ENV=production
      - NODE_TLS_REJECT_UNAUTHORIZED=0
    volumes:
      - ./dist:/usr/share/nginx/html:ro
    networks:
      - risk-mapper-network
    healthcheck:
      test: ["CMD", "wget", "--quiet", "--tries=1", "--spider", "http://localhost/index.html"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 10s

networks:
  risk-mapper-network:
    driver: bridge